events { worker_connections 256; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/ringcatch-access.log;
    error_log  /var/log/nginx/ringcatch-error.log warn;

    gzip            on;
    gzip_types      text/css text/javascript;
    gzip_min_length 256;

    server {
        listen 8090;
        listen [::]:8090;

        root  /usr/share/nginx/html;
        index index.html;

        # Clean URL for booking page
        location = /book {
            try_files /book.html =404;
        }

        # Cal.com booking webhook — proxy to orchestrator
        location = /api/cal-booked {
            proxy_pass         http://100.97.45.57:8109/cal-webhook;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 15s;
        }

        # Chat widget — proxy to outreach service in the same pod
        location = /api/chat {
            proxy_pass         http://127.0.0.1:8080/api/chat;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 90s;
            add_header Access-Control-Allow-Origin "*";
        }

        # Pageview tracking — proxy to outreach service in the same pod
        location = /api/track {
            proxy_pass         http://127.0.0.1:8080/api/track;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy        "strict-origin-when-cross-origin";
    }
}
