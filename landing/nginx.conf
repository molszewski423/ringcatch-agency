events { worker_connections 256; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    gzip            on;
    gzip_types      text/css text/javascript;
    gzip_min_length 256;

    server {
        listen 8090;
        listen [::]:8090;

        root  /usr/share/nginx/html;
        index index.html;

        # Clean URL for booking page
        location = /book {
            try_files /book.html =404;
        }

        # Cal.com booking webhook → orchestrator
        location = /api/cal-booked {
            proxy_pass         http://agency-orchestrator:8109/cal-webhook;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 15s;
        }

        # Website chatbot → orchestrator webchat endpoint
        location = /api/chat {
            proxy_pass         http://agency-orchestrator:8109/webchat;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
            add_header Access-Control-Allow-Origin "*";
        }

        # Proxy other API calls to outreach service (same pod, shared network)
        location /api/ {
            proxy_pass         http://agency-outreach:8080/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 90s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # HTML — never cache (always fresh from CDN)
        location ~* \.(html)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            expires 0;
        }

        # Static assets — cache 7 days (CSS/JS/images don't change without filename change)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            add_header Cache-Control "public, max-age=604800, immutable";
            expires 7d;
        }

        # Security headers
        add_header X-Frame-Options       "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy       "strict-origin-when-cross-origin";
    }
}
