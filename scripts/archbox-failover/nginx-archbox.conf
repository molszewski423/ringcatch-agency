events { worker_connections 256; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/ringcatch-access.log;
    error_log  /var/log/nginx/ringcatch-error.log warn;

    gzip            on;
    gzip_types      text/css text/javascript;
    gzip_min_length 256;

    server {
        listen 80;
        listen [::]:80;

        root  /usr/share/nginx/html;
        index index.html;

        # Clean URL for booking page
        location = /book {
            try_files /book.html =404;
        }

        # Cal.com booking webhook — proxy to main PC orchestrator over Tailscale
        location = /api/cal-booked {
            proxy_pass         http://REMOTE_HOST:8109/cal-webhook;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 15s;
        }

        # Website chatbot — proxy to main PC orchestrator over Tailscale
        location = /api/chat {
            proxy_pass         http://REMOTE_HOST:8109/webchat;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
            add_header Access-Control-Allow-Origin "*";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Security headers
        add_header X-Frame-Options       "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy       "strict-origin-when-cross-origin";
    }
}
